name = "sablon"
main = "src/index.js"
compatibility_date = "2026-06-13"

[vars]
GEMINI_BASE_URL = "https://generativelanguage.googleapis.com/v1beta"
GEMINI_IMAGE_MODEL = "gemini-3.1-flash-image"
GEMINI_REASONING_MODEL = "gemini-2.5-pro"
GEMINI_FALLBACK_POLICY = "quota_or_model_unavailable"
OPENROUTER_BASE_URL = "https://openrouter.ai/api/v1"
OPENROUTER_ANALYSIS_MODEL = ""
OPENROUTER_IMAGE_MODEL = "black-forest-labs/flux.2-klein-4b"
OPENROUTER_IMAGE_MODEL_FALLBACK = "sourceful/riverflow-v2-fast"
OPENROUTER_SAFETY_MODEL = "nvidia/nemotron-3.5-content-safety:free"
OPENROUTER_PROMPT_PROFILE = "generic_trace_clone"
OPENROUTER_IMAGE_QUALITY = "high"
OPENROUTER_IMAGE_SIZE = "1K"
OPENROUTER_REASONING_EFFORT = "low"
OPENROUTER_BACKGROUND_MODE = "transparent"
OPENROUTER_SAFETY_ENABLED = "1"
OPENROUTER_APP_NAME = "EasyRedesign Pro"
OPENROUTER_MAX_IMAGE_INPUT_BYTES = "3200000"
AI_REDRAW_PRESET = "quality"
AI_REDRAW_PRIMARY_PROVIDER = "gemini_direct_image"
AI_REDRAW_FALLBACK_PROVIDER = "openrouter_image"
SUPABASE_URL = "https://wrjhedlygozqtsdallzr.supabase.co"
# Isi setelah backend processor berhasil deploy ke Cloud Run.
# PROCESSOR_BASE_URL = "https://design-mudah-processor-xxxxx.a.run.app"

# Secrets tetap diset di dashboard Cloudflare Worker > Settings > Variables and Secrets.
# Required: GEMINI_API_KEY or OPENROUTER_API_KEY, plus SUPABASE_SERVICE_ROLE_KEY
